<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Conceptual: Desafíos al Integrar EVA</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos adicionales para asegurar el lienzo y ocultar barras de desplazamiento */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 select-none text-slate-200">

    <!-- Panel de Controles Flotante -->
    <div class="absolute top-6 left-6 z-50 bg-slate-800/90 backdrop-blur-sm p-2 rounded-2xl shadow-lg border border-slate-700 flex flex-col gap-2">
        <button id="btn-zoom-in" title="Acercar" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="zoom-in" class="w-[22px] h-[22px]"></i>
        </button>
        <div class="w-full h-px bg-slate-700"></div>
        <button id="btn-zoom-out" title="Alejar" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="zoom-out" class="w-[22px] h-[22px]"></i>
        </button>
        <div class="w-full h-px bg-slate-700"></div>
        <button id="btn-reset" title="Restablecer vista" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="maximize" class="w-[22px] h-[22px]"></i>
        </button>
    </div>

    <!-- Etiqueta de Instrucciones -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-6 text-sm text-slate-300 bg-slate-800/90 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-slate-700 pointer-events-none font-medium">
        <span class="flex items-center gap-2">👆 Haz clic en los nodos para expandir</span>
        <span class="text-slate-600">|</span>
        <span class="flex items-center gap-2">🖐️ Arrastra el fondo para moverte</span>
    </div>

    <!-- Título -->
    <div class="absolute top-6 right-6 z-50 bg-slate-800/90 backdrop-blur-sm px-5 py-3 rounded-2xl shadow-lg border border-slate-700">
        <h1 class="text-lg font-bold text-slate-100">Mapa Conceptual: Retos EVA</h1>
    </div>

    <!-- Lienzo Arrastrable (Canvas) -->
    <div id="canvas-container" class="w-full h-full cursor-grab">
        <div id="mindmap-root" class="origin-top-left transition-transform duration-75 ease-linear p-10 flex justify-center min-w-max">
            <!-- El árbol se renderizará aquí dinámicamente -->
        </div>
    </div>

    <script>
        // === DATOS DEL MAPA CONCEPTUAL ===
        const mindMapData = {
            id: 'root',
            label: 'Desafíos al Integrar EVA',
            children: [
                {
                    id: '1', label: 'Competencias Digitales Insuficientes',
                    children: [
                        { id: '1-1', label: 'Falta de formación en plataformas' },
                        { id: '1-2', label: 'Dificultades en recursos multimedia' },
                        { id: '1-3', label: 'Inseguridad con herramientas' }
                    ]
                },
                {
                    id: '2', label: 'Sobrecarga de Trabajo',
                    children: [
                        { id: '2-1', label: 'Demanda constante de retroalimentación' },
                        { id: '2-2', label: 'Preparación de materiales digitales' },
                        { id: '2-3', label: 'Aumento del tiempo de planificación' }
                    ]
                },
                {
                    id: '3', label: 'Dificultades en Diseño Pedagógico',
                    children: [
                        { id: '3-1', label: 'Transformación de presencial a virtual' },
                        { id: '3-2', label: 'Falta de interactividad y dinamismo' },
                        { id: '3-3', label: 'Predominio del modelo transmisivo' }
                    ]
                },
                {
                    id: '4', label: 'Infraestructura Tecnológica Limitada',
                    children: [
                        { id: '4-1', label: 'Conexiones inestables' },
                        { id: '4-2', label: 'Equipos obsoletos' },
                        { id: '4-3', label: 'Falta de apoyo técnico institucional' }
                    ]
                },
                {
                    id: '5', label: 'Baja Participación Estudiantil',
                    children: [
                        { id: '5-1', label: 'Desmotivación' },
                        { id: '5-2', label: 'Escasa interacción' },
                        { id: '5-3', label: 'Ausencia en actividades síncronas' }
                    ]
                },
                {
                    id: '6', label: 'Retos en la Evaluación en Línea',
                    children: [
                        { id: '6-1', label: 'Validación de la autenticidad' },
                        { id: '6-2', label: 'Dificultad para evaluación formativa' },
                        { id: '6-3', label: 'Retraso en retroalimentación' }
                    ]
                },
                {
                    id: '7', label: 'Gestión del Tiempo',
                    children: [
                        { id: '7-1', label: 'Disponibilidad extendida' },
                        { id: '7-2', label: 'Desbalance vida laboral-personal' }
                    ]
                },
                {
                    id: '8', label: 'Resistencia al Cambio',
                    children: [
                        { id: '8-1', label: 'Dudas sobre efectividad virtual' },
                        { id: '8-2', label: 'Resistencia a modificar prácticas' }
                    ]
                },
                {
                    id: '9', label: 'Falta de Apoyo Institucional',
                    children: [
                        { id: '9-1', label: 'Escasa capacitación continua' },
                        { id: '9-2', label: 'Limitado acompañamiento técnico' },
                        { id: '9-3', label: 'Ausencia de políticas claras' }
                    ]
                }
            ]
        };

        // === LÓGICA DE RENDERIZADO DEL ÁRBOL ===
        function createNodeElement(node, level = 0) {
            const hasChildren = node.children && node.children.length > 0;
            const isRoot = level === 0;
            // Estado inicial: abrir nodo raíz, cerrar el resto.
            let isOpen = level < 1; 

            // Contenedor principal de la rama
            const branchContainer = document.createElement('div');
            branchContainer.className = 'flex flex-col items-center';

            // Línea vertical entrante (excepto para la raíz)
            if (!isRoot) {
                const incomingLine = document.createElement('div');
                incomingLine.className = 'w-[2px] h-8 bg-indigo-500/30 shrink-0';
                branchContainer.appendChild(incomingLine);
            }

            // Tarjeta del Nodo
            const card = document.createElement('div');
            
            // Estilos de la tarjeta
            let cardStyles = "mindmap-node relative flex items-center justify-between px-5 py-3 rounded-2xl border-2 transition-all duration-300 ease-in-out min-w-[220px] max-w-[320px] z-10 shrink-0 ";
            if (isRoot) {
                cardStyles += "bg-gradient-to-br from-indigo-600 to-blue-700 text-white text-xl font-bold shadow-xl border-transparent";
            } else if (level === 1) {
                cardStyles += "bg-slate-800 text-indigo-100 font-semibold shadow-md border-indigo-500/40 hover:border-indigo-400 hover:bg-slate-700 hover:shadow-lg hover:shadow-indigo-900/20";
            } else {
                cardStyles += "bg-slate-800 text-slate-300 text-sm shadow-sm border-slate-700 hover:bg-slate-700 hover:border-slate-500";
            }
            if (hasChildren) cardStyles += " cursor-pointer";
            
            card.className = cardStyles;
            card.innerHTML = `<span class="leading-snug">${node.label}</span>`;

            // Icono del Nodo (si tiene hijos)
            let iconSpan;
            if (hasChildren) {
                iconSpan = document.createElement('span');
                iconSpan.className = `ml-3 flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full transition-colors ${isRoot ? 'bg-white/20 text-white' : 'bg-indigo-500/20 text-indigo-300'}`;
                iconSpan.innerHTML = `<i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4"></i>`;
                card.appendChild(iconSpan);
            }

            branchContainer.appendChild(card);

            // Ramas hijas
            if (hasChildren) {
                const childrenWrapper = document.createElement('div');
                
                // Clases de transición para mostrar/ocultar
                const openClasses = ['max-w-[8000px]', 'max-h-[3000px]', 'opacity-100'];
                const closedClasses = ['max-w-0', 'max-h-0', 'opacity-0'];
                
                childrenWrapper.className = `flex flex-col items-center overflow-hidden transition-all duration-500 ease-in-out`;
                if (isOpen) childrenWrapper.classList.add(...openClasses);
                else childrenWrapper.classList.add(...closedClasses);

                // Línea saliente
                const outgoingLine = document.createElement('div');
                outgoingLine.className = 'w-[2px] h-8 bg-indigo-500/30 shrink-0';
                childrenWrapper.appendChild(outgoingLine);

                // Contenedor con borde superior para los hijos
                const childrenListContainer = document.createElement('div');
                childrenListContainer.className = 'flex flex-row items-start gap-4 border-t-[2px] border-indigo-500/30 pt-6 shrink-0';

                // Llamada recursiva para renderizar los hijos
                node.children.forEach(child => {
                    childrenListContainer.appendChild(createNodeElement(child, level + 1));
                });

                childrenWrapper.appendChild(childrenListContainer);
                branchContainer.appendChild(childrenWrapper);

                // Evento Clic para colapsar/expandir
                card.addEventListener('click', (e) => {
                    isOpen = !isOpen;
                    if (isOpen) {
                        childrenWrapper.classList.remove(...closedClasses);
                        childrenWrapper.classList.add(...openClasses);
                        iconSpan.innerHTML = `<i data-lucide="chevron-up" class="w-4 h-4"></i>`;
                    } else {
                        childrenWrapper.classList.remove(...openClasses);
                        childrenWrapper.classList.add(...closedClasses);
                        iconSpan.innerHTML = `<i data-lucide="chevron-down" class="w-4 h-4"></i>`;
                    }
                    lucide.createIcons(); // Recargar iconos después del cambio de HTML
                });
            }

            return branchContainer;
        }

        // Renderizar el árbol en el HTML
        const mindmapRoot = document.getElementById('mindmap-root');
        mindmapRoot.appendChild(createNodeElement(mindMapData));
        
        // Inicializar iconos
        lucide.createIcons();

        // === LÓGICA DE MOVIMIENTO Y ZOOM ===
        let scale = 0.85;
        let position = { x: 50, y: 50 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };

        const canvasContainer = document.getElementById('canvas-container');

        function updateTransform() {
            mindmapRoot.style.transform = `translate(${position.x}px, ${position.y}px) scale(${scale})`;
        }

        // Inicializar posición
        updateTransform();

        // Arrastrar
        canvasContainer.addEventListener('mousedown', (e) => {
            // Ignorar clics sobre los nodos (tarjetas) o botones del panel
            if (e.target.closest('.mindmap-node') || e.target.closest('button')) return;
            
            isDragging = true;
            canvasContainer.classList.remove('cursor-grab');
            canvasContainer.classList.add('cursor-grabbing');
            
            dragStart = {
                x: e.clientX - position.x,
                y: e.clientY - position.y
            };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            position = {
                x: e.clientX - dragStart.x,
                y: e.clientY - dragStart.y
            };
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                canvasContainer.classList.remove('cursor-grabbing');
                canvasContainer.classList.add('cursor-grab');
            }
        });

        // Controles de Zoom
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            scale = Math.min(scale + 0.15, 2);
            updateTransform();
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            scale = Math.max(scale - 0.15, 0.4);
            updateTransform();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            scale = 0.85;
            position = { x: 50, y: 50 };
            updateTransform();
        });

    </script>
</body>
</html>
