<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Conceptual: Desafíos al Integrar EVA</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos adicionales para asegurar el lienzo y ocultar barras de desplazamiento */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 select-none text-slate-200">

    <!-- Cabecera Fija con Imagen Temática -->
    <header class="fixed top-0 left-0 w-full z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-700 shadow-xl px-4 py-4 flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 text-center sm:text-left relative">
        <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-2xl overflow-hidden shrink-0 border-[3px] border-indigo-500/50 shadow-lg shadow-indigo-900/20">
            <img 
                src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=400&q=80" 
                alt="" 
                class="w-full h-full object-cover"
            >
        </div>
        <div class="flex flex-col items-center sm:items-start">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-100 flex items-center gap-2">
                <i data-lucide="network" class="w-7 h-7 sm:w-8 sm:h-8 text-indigo-400"></i>
                Mapa Conceptual: Retos EVA
            </h1>
            <p class="text-base sm:text-lg text-slate-400 mt-1 font-medium">Desafíos de los Docentes al Integrar Entornos Virtuales de Aprendizaje</p>
        </div>
    </header>

    <!-- Panel de Controles Flotante (Movido Abajo a la Derecha para no estorbar los nodos) -->
    <div class="absolute bottom-6 right-6 z-40 bg-slate-800/90 backdrop-blur-sm p-2 rounded-2xl shadow-lg border border-slate-700 flex flex-col gap-2">
        <button id="btn-zoom-in" title="Acercar" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="zoom-in" class="w-[22px] h-[22px]"></i>
        </button>
        <div class="w-full h-px bg-slate-700"></div>
        <button id="btn-zoom-out" title="Alejar" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="zoom-out" class="w-[22px] h-[22px]"></i>
        </button>
        <div class="w-full h-px bg-slate-700"></div>
        <button id="btn-reset" title="Restablecer vista" class="p-2.5 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors cursor-pointer">
            <i data-lucide="maximize" class="w-[22px] h-[22px]"></i>
        </button>
    </div>

    <!-- Etiqueta de Instrucciones (Adaptada para móviles) -->
    <div class="absolute bottom-6 left-6 z-30 flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-6 text-xs sm:text-sm text-slate-300 bg-slate-800/90 backdrop-blur-md px-4 sm:px-6 py-3 rounded-2xl sm:rounded-full shadow-lg border border-slate-700 pointer-events-none font-medium max-w-[60%] sm:max-w-none">
        <span class="flex items-center gap-2"><i data-lucide="mouse-pointer-click" class="w-4 h-4 shrink-0"></i> <span class="hidden sm:inline">Clic para expandir ramas</span><span class="sm:hidden">Expandir</span></span>
        <span class="hidden sm:block text-slate-600">|</span>
        <span class="flex items-center gap-2 text-indigo-200"><i data-lucide="file-text" class="w-4 h-4 shrink-0"></i> <span class="hidden sm:inline">Toca los retos finales para ver detalles</span><span class="sm:hidden">Detalles</span></span>
        <span class="hidden sm:block text-slate-600">|</span>
        <span class="flex items-center gap-2"><i data-lucide="move" class="w-4 h-4 shrink-0"></i> <span class="hidden sm:inline">Arrastra el fondo</span><span class="sm:hidden">Mover</span></span>
    </div>

    <!-- Lienzo Arrastrable (Canvas) -->
    <div id="canvas-container" class="w-full h-full cursor-grab pt-40">
        <div id="mindmap-root" class="origin-top-left transition-transform duration-75 ease-linear p-10 flex min-w-max">
            <!-- El árbol se renderizará aquí dinámicamente -->
        </div>
    </div>

    <!-- Modal de Información de la Jerarquía -->
    <div id="info-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-slate-950/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl max-w-lg w-full flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="info-modal-panel">
            
            <!-- Modal Header -->
            <div class="bg-gradient-to-r from-slate-800 to-slate-750 px-6 py-4 border-b border-slate-700 flex justify-between items-start gap-4">
                <div>
                    <div class="flex items-center gap-2 text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">
                        <i data-lucide="info" class="w-4 h-4"></i> Detalle del Reto
                    </div>
                    <h3 id="info-modal-title" class="text-lg sm:text-xl font-bold text-slate-100 leading-tight">Título</h3>
                </div>
                <button id="close-info-modal" class="text-slate-400 hover:text-rose-400 hover:bg-slate-700 p-1.5 rounded-lg transition-colors shrink-0 cursor-pointer">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Modal Body -->
            <div class="p-6 flex flex-col gap-5 overflow-y-auto max-h-[60vh] select-text">
                <div id="info-modal-content" class="text-slate-300 text-sm md:text-base leading-relaxed space-y-3">
                    <!-- Contenido dinámico -->
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="p-4 bg-slate-800/50 border-t border-slate-700 flex justify-end">
                <button id="btn-close-info" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-5 py-2.5 rounded-xl font-semibold transition-all cursor-pointer">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script>
        // === DATOS DEL MAPA CONCEPTUAL ===
        const mindMapData = {
            id: 'root', label: 'Desafíos al Integrar EVA',
            children: [
                { id: '1', label: 'Competencias Digitales Insuficientes', children: [{ id: '1-1', label: 'Falta de formación en plataformas' }, { id: '1-2', label: 'Dificultades en recursos multimedia' }, { id: '1-3', label: 'Inseguridad con herramientas' }] },
                { id: '2', label: 'Sobrecarga de Trabajo', children: [{ id: '2-1', label: 'Demanda constante de retroalimentación' }, { id: '2-2', label: 'Preparación de materiales digitales' }, { id: '2-3', label: 'Aumento del tiempo de planificación' }] },
                { id: '3', label: 'Dificultades en Diseño Pedagógico', children: [{ id: '3-1', label: 'Transformación de presencial a virtual' }, { id: '3-2', label: 'Falta de interactividad y dinamismo' }, { id: '3-3', label: 'Predominio del modelo transmisivo' }] },
                { id: '4', label: 'Infraestructura Tecnológica Limitada', children: [{ id: '4-1', label: 'Conexiones inestables' }, { id: '4-2', label: 'Equipos obsoletos' }, { id: '4-3', label: 'Falta de apoyo técnico institucional' }] },
                { id: '5', label: 'Baja Participación Estudiantil', children: [{ id: '5-1', label: 'Desmotivación' }, { id: '5-2', label: 'Escasa interacción' }, { id: '5-3', label: 'Ausencia en actividades síncronas' }] },
                { id: '6', label: 'Retos en la Evaluación en Línea', children: [{ id: '6-1', label: 'Validación de la autenticidad' }, { id: '6-2', label: 'Dificultad para evaluación formativa' }, { id: '6-3', label: 'Retraso en retroalimentación' }] },
                { id: '7', label: 'Gestión del Tiempo', children: [{ id: '7-1', label: 'Disponibilidad extendida' }, { id: '7-2', label: 'Desbalance vida laboral-personal' }] },
                { id: '8', label: 'Resistencia al Cambio', children: [{ id: '8-1', label: 'Dudas sobre efectividad virtual' }, { id: '8-2', label: 'Resistencia a modificar prácticas' }] },
                { id: '9', label: 'Falta de Apoyo Institucional', children: [{ id: '9-1', label: 'Escasa capacitación continua' }, { id: '9-2', label: 'Limitado acompañamiento técnico' }, { id: '9-3', label: 'Ausencia de políticas claras' }] }
            ]
        };

        // === LÓGICA DEL MODAL DE INFORMACIÓN ===
        const infoModal = document.getElementById('info-modal');
        const infoModalPanel = document.getElementById('info-modal-panel');
        const infoModalTitle = document.getElementById('info-modal-title');
        const infoModalContent = document.getElementById('info-modal-content');

        // Diccionario de imágenes temáticas
        const imageMap = {
            'formación': 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=600&q=80',
            'multimedia': 'https://images.unsplash.com/photo-1600132806370-bf17e65e942f?auto=format&fit=crop&w=600&q=80',
            'herramientas': 'https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80',
            'retroalimentación': 'https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=600&q=80',
            'materiales': 'https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=600&q=80',
            'planificación': 'https://images.unsplash.com/photo-1506784365847-bbad939e9335?auto=format&fit=crop&w=600&q=80',
            'presencial': 'https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=600&q=80',
            'virtual': 'https://images.unsplash.com/photo-1610484826917-0f101a7bf7f4?auto=format&fit=crop&w=600&q=80',
            'interactividad': 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80',
            'transmisivo': 'https://images.unsplash.com/photo-1473649085228-583485e6e4d7?auto=format&fit=crop&w=600&q=80',
            'inestables': 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=600&q=80',
            'conexiones': 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=600&q=80',
            'obsoletos': 'https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80',
            'técnico': 'https://images.unsplash.com/photo-1593642632823-8f785ba67e45?auto=format&fit=crop&w=600&q=80',
            'desmotivación': 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&w=600&q=80',
            'interacción': 'https://images.unsplash.com/photo-1529156069898-49953eb1f5ce?auto=format&fit=crop&w=600&q=80',
            'síncronas': 'https://images.unsplash.com/photo-1588196749597-9ff075ee6b5b?auto=format&fit=crop&w=600&q=80',
            'autenticidad': 'https://images.unsplash.com/photo-1585076641399-5c06d1b3365f?auto=format&fit=crop&w=600&q=80',
            'formativa': 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80',
            'retraso': 'https://images.unsplash.com/photo-1501139083538-0139583c060f?auto=format&fit=crop&w=600&q=80',
            'extendida': 'https://images.unsplash.com/photo-1497215848145-5afd60a3d5ce?auto=format&fit=crop&w=600&q=80',
            'desbalance': 'https://images.unsplash.com/photo-1498677231914-50a74ad2805f?auto=format&fit=crop&w=600&q=80',
            'efectividad': 'https://images.unsplash.com/photo-1516534775068-ba3e7458af70?auto=format&fit=crop&w=600&q=80',
            'modificar': 'https://images.unsplash.com/photo-1455309036818-60c04f995874?auto=format&fit=crop&w=600&q=80',
            'capacitación': 'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=600&q=80',
            'acompañamiento': 'https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=600&q=80',
            'políticas': 'https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=600&q=80',
            'default': 'https://images.unsplash.com/photo-1501504905252-473c47e087f8?auto=format&fit=crop&w=600&q=80'
        };

        function getImageUrlForTitle(title) {
            const t = title.toLowerCase();
            for (const [key, url] of Object.entries(imageMap)) {
                if (t.includes(key)) return url;
            }
            return imageMap['default'];
        }

        function openInfoModal(title) {
            infoModalTitle.textContent = title;
            const imageUrl = getImageUrlForTitle(title);
            
            // Inyectamos el contenido que pertenece a la jerarquía inferior
            infoModalContent.innerHTML = `
                <div class="bg-slate-700/30 border border-slate-600/50 rounded-xl overflow-hidden shadow-inner">
                    <img src="${imageUrl}" alt="[Image of ${title}]" class="w-full h-40 sm:h-48 object-cover border-b border-slate-600/50">
                    <div class="p-5">
                        <p class="text-slate-200 mb-3">Has seleccionado un desafío específico dentro del mapa conceptual sobre Entornos Virtuales de Aprendizaje (EVA).</p>
                        <div class="flex items-start gap-3 mt-4 bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-md">
                            <i data-lucide="chevron-right-square" class="w-5 h-5 text-indigo-400 shrink-0 mt-0.5"></i>
                            <p class="font-medium text-slate-100">${title}</p>
                        </div>
                    </div>
                </div>
            `;
            
            infoModal.classList.remove('hidden');
            setTimeout(() => { 
                infoModal.classList.remove('opacity-0'); 
                infoModalPanel.classList.remove('scale-95'); 
            }, 10);
            
            lucide.createIcons();
        }

        function closeInfoModal() {
            infoModal.classList.add('opacity-0'); 
            infoModalPanel.classList.add('scale-95');
            setTimeout(() => { infoModal.classList.add('hidden'); }, 300);
        }

        document.getElementById('close-info-modal').addEventListener('click', closeInfoModal);
        document.getElementById('btn-close-info').addEventListener('click', closeInfoModal);
        infoModal.addEventListener('click', (e) => {
            if (e.target === infoModal) closeInfoModal();
        });

        // === PALETA DE COLORES ===
        const colorThemes = [
            { main: 'bg-emerald-900 text-emerald-100 border-emerald-600/60 hover:bg-emerald-800 hover:border-emerald-400', child: 'bg-emerald-950/80 text-emerald-200 border-emerald-800/80 hover:bg-emerald-900', line: 'bg-emerald-600/40', iconText: 'text-emerald-300', iconBg: 'bg-emerald-500/20' },
            { main: 'bg-blue-900 text-blue-100 border-blue-600/60 hover:bg-blue-800 hover:border-blue-400', child: 'bg-blue-950/80 text-blue-200 border-blue-800/80 hover:bg-blue-900', line: 'bg-blue-600/40', iconText: 'text-blue-300', iconBg: 'bg-blue-500/20' },
            { main: 'bg-purple-900 text-purple-100 border-purple-600/60 hover:bg-purple-800 hover:border-purple-400', child: 'bg-purple-950/80 text-purple-200 border-purple-800/80 hover:bg-purple-900', line: 'bg-purple-600/40', iconText: 'text-purple-300', iconBg: 'bg-purple-500/20' },
            { main: 'bg-rose-900 text-rose-100 border-rose-600/60 hover:bg-rose-800 hover:border-rose-400', child: 'bg-rose-950/80 text-rose-200 border-rose-800/80 hover:bg-rose-900', line: 'bg-rose-600/40', iconText: 'text-rose-300', iconBg: 'bg-rose-500/20' },
            { main: 'bg-amber-900 text-amber-100 border-amber-600/60 hover:bg-amber-800 hover:border-amber-400', child: 'bg-amber-950/80 text-amber-200 border-amber-800/80 hover:bg-amber-900', line: 'bg-amber-600/40', iconText: 'text-amber-300', iconBg: 'bg-amber-500/20' },
            { main: 'bg-cyan-900 text-cyan-100 border-cyan-600/60 hover:bg-cyan-800 hover:border-cyan-400', child: 'bg-cyan-950/80 text-cyan-200 border-cyan-800/80 hover:bg-cyan-900', line: 'bg-cyan-600/40', iconText: 'text-cyan-300', iconBg: 'bg-cyan-500/20' },
            { main: 'bg-fuchsia-900 text-fuchsia-100 border-fuchsia-600/60 hover:bg-fuchsia-800 hover:border-fuchsia-400', child: 'bg-fuchsia-950/80 text-fuchsia-200 border-fuchsia-800/80 hover:bg-fuchsia-900', line: 'bg-fuchsia-600/40', iconText: 'text-fuchsia-300', iconBg: 'bg-fuchsia-500/20' },
            { main: 'bg-orange-900 text-orange-100 border-orange-600/60 hover:bg-orange-800 hover:border-orange-400', child: 'bg-orange-950/80 text-orange-200 border-orange-800/80 hover:bg-orange-900', line: 'bg-orange-600/40', iconText: 'text-orange-300', iconBg: 'bg-orange-500/20' },
            { main: 'bg-teal-900 text-teal-100 border-teal-600/60 hover:bg-teal-800 hover:border-teal-400', child: 'bg-teal-950/80 text-teal-200 border-teal-800/80 hover:bg-teal-900', line: 'bg-teal-600/40', iconText: 'text-teal-300', iconBg: 'bg-teal-500/20' }
        ];

        // === LÓGICA DE RENDERIZADO DEL MAPA (ORIENTACIÓN VERTICAL DE LISTA, EXPANSIÓN HORIZONTAL) ===
        function createNodeElement(node, level = 0, childIndex = 0, passedTheme = null, onOpen = null) {
            const hasChildren = node.children && node.children.length > 0;
            const isRoot = level === 0;
            let isOpen = level < 1; 
            let closeSelf = null;

            let theme = passedTheme;
            if (level === 1) theme = colorThemes[childIndex % colorThemes.length];

            const lineColorClass = theme ? theme.line : 'bg-slate-600/50';
            const branchContainer = document.createElement('div');
            // Cambiado a flex-row para expandir de izquierda a derecha
            branchContainer.className = 'flex items-center';

            if (!isRoot) {
                const incomingLine = document.createElement('div');
                // Cambiada línea a horizontal
                incomingLine.className = `w-6 sm:w-10 h-[2px] ${lineColorClass} shrink-0 transition-colors duration-300`;
                branchContainer.appendChild(incomingLine);
            }

            const card = document.createElement('div');
            let cardStyles = "mindmap-node relative flex items-center justify-between rounded-2xl border-[1.5px] transition-all duration-300 ease-in-out z-10 shrink-0 shadow-md cursor-pointer ";
            
            if (isRoot) {
                cardStyles += "px-8 py-5 text-2xl md:text-3xl font-extrabold bg-gradient-to-b from-slate-700 to-slate-800 text-white shadow-xl border-slate-500 min-w-[280px]";
            } else if (level === 1) {
                cardStyles += `px-6 py-4 text-lg md:text-xl font-bold ${theme.main} min-w-[250px] max-w-[360px]`;
            } else {
                cardStyles += `px-5 py-3 text-base md:text-lg font-medium ${theme.child} min-w-[220px] max-w-[320px]`;
                if (!hasChildren) cardStyles += " hover:-translate-y-1 hover:border-slate-400";
            }
            
            card.className = cardStyles;
            card.innerHTML = `<span class="leading-snug">${node.label}</span>`;

            let iconSpan = document.createElement('span');
            if (hasChildren) {
                const iconColors = isRoot ? 'bg-white/20 text-white' : `${theme.iconBg} ${theme.iconText}`;
                iconSpan.className = `ml-4 flex-shrink-0 flex items-center justify-center w-7 h-7 md:w-8 md:h-8 rounded-full transition-colors ${iconColors}`;
                // Los iconos ahora apuntan hacia la derecha (cerrado) y abajo (abierto)
                iconSpan.innerHTML = `<i data-lucide="${isOpen ? 'chevron-down' : 'chevron-right'}" class="w-5 h-5"></i>`;
            } else {
                iconSpan.className = `ml-4 flex-shrink-0 flex items-center justify-center w-8 h-8 md:w-9 md:h-9 rounded-full bg-slate-700/50 text-slate-300 group transition-transform hover:scale-110`;
                iconSpan.title = "Ver detalles";
                iconSpan.innerHTML = `<i data-lucide="file-text" class="w-5 h-5"></i>`;
            }
            card.appendChild(iconSpan);
            branchContainer.appendChild(card);

            if (hasChildren) {
                const childrenWrapper = document.createElement('div');
                const openClasses = ['max-w-[8000px]', 'max-h-[3000px]', 'opacity-100'];
                const closedClasses = ['max-w-0', 'max-h-0', 'opacity-0'];
                
                // Cambiado para agrupar horizontalmente
                childrenWrapper.className = `flex items-center overflow-hidden transition-all duration-500 ease-in-out`;
                if (isOpen) childrenWrapper.classList.add(...openClasses);
                else childrenWrapper.classList.add(...closedClasses);

                closeSelf = () => {
                    if (!isOpen) return;
                    isOpen = false;
                    childrenWrapper.classList.remove(...openClasses);
                    childrenWrapper.classList.add(...closedClasses);
                    iconSpan.innerHTML = `<i data-lucide="chevron-right" class="w-5 h-5"></i>`;
                    lucide.createIcons();
                };

                const outgoingLine = document.createElement('div');
                // Cambiada línea a horizontal
                outgoingLine.className = `w-6 sm:w-10 h-[2px] ${lineColorClass} shrink-0 transition-colors duration-300`;
                childrenWrapper.appendChild(outgoingLine);

                const childrenListContainer = document.createElement('div');
                // Cambiado a columna vertical con borde a la izquierda
                childrenListContainer.className = `flex flex-col items-start gap-4 border-l-[2px] ${lineColorClass} py-4 shrink-0 transition-colors duration-300`;

                const childCloseFuncs = [];
                node.children.forEach((child, index) => {
                    const onChildOpen = () => {
                        childCloseFuncs.forEach((fn, i) => { if (i !== index && fn) fn(); });
                    };
                    const childResult = createNodeElement(child, level + 1, index, theme, onChildOpen);
                    childrenListContainer.appendChild(childResult.element);
                    childCloseFuncs.push(childResult.closeSelf);
                });

                childrenWrapper.appendChild(childrenListContainer);
                branchContainer.appendChild(childrenWrapper);

                card.addEventListener('click', () => {
                    if (isOpen) {
                        closeSelf();
                    } else {
                        isOpen = true; 
                        childrenWrapper.classList.remove(...closedClasses);
                        childrenWrapper.classList.add(...openClasses);
                        iconSpan.innerHTML = `<i data-lucide="chevron-down" class="w-5 h-5"></i>`;
                        if (onOpen) onOpen();
                        lucide.createIcons();
                    }
                });
            } else {
                card.addEventListener('click', () => openInfoModal(node.label));
            }

            return { element: branchContainer, closeSelf };
        }

        const mindmapRoot = document.getElementById('mindmap-root');
        mindmapRoot.appendChild(createNodeElement(mindMapData).element);
        lucide.createIcons();

        // === LÓGICA DE MOVIMIENTO, ZOOM Y RESPONSIVIDAD ===
        let scale = window.innerWidth < 768 ? 0.6 : 0.85;
        // Ajustamos la posición inicial para el layout horizontal
        let position = { x: window.innerWidth < 768 ? 20 : 60, y: window.innerWidth < 768 ? 160 : 200 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        const canvasContainer = document.getElementById('canvas-container');

        function updateTransform() {
            mindmapRoot.style.transform = `translate(${position.x}px, ${position.y}px) scale(${scale})`;
        }
        updateTransform();

        function startDrag(clientX, clientY, target) {
            if (target.closest('.mindmap-node') || target.closest('button') || target.closest('header')) return;
            isDragging = true;
            canvasContainer.classList.remove('cursor-grab');
            canvasContainer.classList.add('cursor-grabbing');
            dragStart = { x: clientX - position.x, y: clientY - position.y };
        }

        function onDrag(clientX, clientY) {
            if (!isDragging) return;
            position = { x: clientX - dragStart.x, y: clientY - dragStart.y };
            updateTransform();
        }

        function stopDrag() {
            if (isDragging) {
                isDragging = false;
                canvasContainer.classList.remove('cursor-grabbing');
                canvasContainer.classList.add('cursor-grab');
            }
        }

        // Eventos de ratón
        canvasContainer.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY, e.target));
        window.addEventListener('mousemove', (e) => onDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', stopDrag);
        canvasContainer.addEventListener('mouseleave', stopDrag);

        // Eventos táctiles
        canvasContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                startDrag(e.touches[0].clientX, e.touches[0].clientY, e.target);
            }
        }, { passive: false });
        
        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault();
                onDrag(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });
        
        window.addEventListener('touchend', stopDrag);

        // Controles
        document.getElementById('btn-zoom-in').addEventListener('click', () => { scale = Math.min(scale + 0.15, 2); updateTransform(); });
        document.getElementById('btn-zoom-out').addEventListener('click', () => { scale = Math.max(scale - 0.15, 0.3); updateTransform(); });
        document.getElementById('btn-reset').addEventListener('click', () => { 
            scale = window.innerWidth < 768 ? 0.6 : 0.85; 
            position = { x: window.innerWidth < 768 ? 20 : 60, y: window.innerWidth < 768 ? 160 : 200 }; 
            updateTransform(); 
        });

    </script>
</body>
</html>
